name: Deploy LIFF page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject runtime config into index.html
        run: |
          mkdir -p dist
          sed \
            -e "s|__LIFF_ID__|${LIFF_ID}|g" \
            -e "s|__API_BASE_URL__|${API_BASE_URL}|g" \
            -e "s|__API_ACCESS_TOKEN__|${API_ACCESS_TOKEN}|g" \
            index.html > dist/index.html
          cp -r assets dist/assets
        env:
          LIFF_ID: ${{ secrets.LIFF_ID }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_ACCESS_TOKEN: ${{ secrets.API_ACCESS_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
